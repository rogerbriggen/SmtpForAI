name: CI

on:
  push:
  pull_request:

jobs:
  # Runs on every push and PR — Linux is the cheap default.
  linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SmtpForAI.slnx
      - run: dotnet build SmtpForAI.slnx -c Release --no-restore
      - run: dotnet test SmtpForAI.slnx -c Release --no-build

  # Only on main (push/merge) — exercises Windows without paying the higher
  # Windows-minute cost on every PR.
  windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SmtpForAI.slnx
      - run: dotnet build SmtpForAI.slnx -c Release --no-restore
      - run: dotnet test SmtpForAI.slnx -c Release --no-build
