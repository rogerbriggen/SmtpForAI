name: CI

on:
  push:
  pull_request:

jobs:
  # Runs on every push and PR — Linux is the cheap default.
  linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SmtpForAI.slnx
      - run: dotnet build SmtpForAI.slnx -c Release --no-restore
      - run: dotnet test SmtpForAI.slnx -c Release --no-build
      - name: Publish self-contained linux-x64
        run: >
          dotnet publish SmtpForAI/SmtpForAI.csproj
          -c Release -r linux-x64 --self-contained true
          -o publish/linux-x64
      - name: Upload linux-x64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmtpForAI-linux-x64-${{ github.sha }}
          path: publish/linux-x64
          if-no-files-found: error
          retention-days: 14

  # Only on main (push/merge) — exercises Windows without paying the higher
  # Windows-minute cost on every PR.
  windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore SmtpForAI.slnx
      - run: dotnet build SmtpForAI.slnx -c Release --no-restore
      - run: dotnet test SmtpForAI.slnx -c Release --no-build
      - name: Publish self-contained win-x64
        run: >
          dotnet publish SmtpForAI/SmtpForAI.csproj
          -c Release -r win-x64 --self-contained true
          -o publish/win-x64
      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v7
        with:
          name: SmtpForAI-win-x64-${{ github.sha }}
          path: publish/win-x64
          if-no-files-found: error
          retention-days: 14
